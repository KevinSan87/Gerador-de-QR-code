<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code</title>
    <link rel="stylesheet" href="style.css">
    <!-- Biblioteca QRCode.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <div class="container">
        <h1>Gerador de QR Code</h1>
        
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Cole ou digite a URL aqui...">
            <button class="btn-generate" id="generateBtn">Gerar QR Code</button>
        </div>
        
        <div id="qrcode"></div>
        
        <button id="downloadBtn" class="btn-download">Baixar QR Code (PNG)</button>

        <div class="history-section">
            <h2>Histórico Recente</h2>
            <ul id="historyList"></ul>
            <button class="btn-clear" id="clearHistoryBtn">Limpar Histórico</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
